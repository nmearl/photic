name: photic

services:
  forecast-gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../data/forecasts:/data/forecasts:ro
    command:
      - photic
      - forecast-gui
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --forecast-dir
      - /data/forecasts
